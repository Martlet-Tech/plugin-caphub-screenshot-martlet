[plugin]
name = "screenshot"
version = "0.1.0"
description = "Screen capture — select region, capture to file"

[hooks]
mouse = true
keyboard = true

[capabilities]
overlay = true
screen = true

[events]
subscribes = ["screenshot.capture", "keyboard.down", "plugin.action", "mouse.down", "mouse.move", "mouse.up"]
publishes = []
